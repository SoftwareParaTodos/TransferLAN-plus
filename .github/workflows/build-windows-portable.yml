name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "core/server/main.go"
      - "core/server/go.mod"
      - "Windows/**"
      - ".github/workflows/build-windows-portable.yml"

jobs:
  build-windows:
    name: Build TransferLAN+ Windows Portable
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Build Windows EXE
        working-directory: core/server
        shell: pwsh
        run: go build -o TransferLAN+.exe main.go

      - name: Prepare portable folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/TransferLAN-plus-Windows | Out-Null
          New-Item -ItemType Directory -Force dist/TransferLAN-plus-Windows/downloads | Out-Null
          Copy-Item core/server/TransferLAN+.exe dist/TransferLAN-plus-Windows/ -Force
          Copy-Item Windows/* dist/TransferLAN-plus-Windows/ -Recurse -Force

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: TransferLANPlus-v1.5.9-beta-windows-portable
          path: dist/TransferLAN-plus-Windows/