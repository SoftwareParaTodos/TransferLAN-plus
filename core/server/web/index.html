<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>TransferLAN+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#0f172a; color:#e5e7eb; margin:0; padding:24px; }
    .card { max-width:760px; margin:auto; background:#111827; border:1px solid #1f2937; border-radius:18px; padding:24px; box-shadow:0 10px 35px #0008; }
    h1 { margin:0 0 8px; }
    .tag { color:#38bdf8; font-weight:700; }
    .box { border:1px dashed #475569; border-radius:14px; padding:20px; margin-top:18px; }
    button { background:#38bdf8; color:#00111f; border:0; border-radius:12px; padding:12px 18px; font-weight:800; cursor:pointer; }
    input { margin:12px 0; }
    pre { white-space:pre-wrap; background:#020617; padding:14px; border-radius:12px; overflow:auto; }
    .ok { color:#22c55e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TransferLAN+</h1>
    <div class="tag">Sin cuentas. Sin nube. Sin cables.</div>
    <p>Beta ejecutable base v1.0.1-beta</p>

    <div class="box">
      <h2>Estado del servidor</h2>
      <button onclick="checkHealth()">Verificar</button>
      <pre id="health">Sin verificar</pre>
    </div>

    <div class="box">
      <h2>Subir archivo a esta computadora</h2>
      <input type="file" id="file">
      <br>
      <button onclick="upload()">Subir archivo</button>
      <pre id="result">Esperando archivo...</pre>
    </div>
  </div>

<script>
async function checkHealth() {
  const r = await fetch('/health');
  document.getElementById('health').textContent = JSON.stringify(await r.json(), null, 2);
}
async function upload() {
  const f = document.getElementById('file').files[0];
  if (!f) { alert('Elegí un archivo'); return; }
  const fd = new FormData();
  fd.append('file', f);
  document.getElementById('result').textContent = 'Subiendo...';
  const r = await fetch('/transfer/upload', { method:'POST', body:fd });
  document.getElementById('result').textContent = JSON.stringify(await r.json(), null, 2);
}
checkHealth();
</script>
</body>
</html>
